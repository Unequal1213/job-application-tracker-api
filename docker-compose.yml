services:
  app:
    build:
      context: .
    environment:
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-job_tracker_user}:${POSTGRES_PASSWORD:-job_tracker_password}@postgres:5432/${POSTGRES_DB:-job_tracker_db}
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:17
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-job_tracker_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-job_tracker_password}
      POSTGRES_DB: ${POSTGRES_DB:-job_tracker_db}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
